<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnet Master & Network Calculator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --text: #0f172a;
            --square-on: #10b981;
            --square-off: #cbd5e1;
            --accent: #7c3aed;
            --calc-bg: #1e293b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
        }

        .main-wrapper {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
            width: 100%;
            max-width: 1440px;
        }

        .app-container {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        header { text-align: center; margin-bottom: 2rem; }
        h1 { margin: 0; color: var(--primary); font-size: 1.75rem; }

        .ipv4-display {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 2.5rem;
            align-items: center;
        }

        .octet-group {
            background: #f8fafc;
            padding: 1.2rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            text-align: center;
            min-width: 240px;
        }

        .bits-row { display: flex; gap: 4px; margin-bottom: 0.8rem; justify-content: center; }
        .bit-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .bit-label { font-size: 0.65rem; font-weight: bold; color: #94a3b8; }

        .bit-btn {
            width: 32px;
            height: 42px;
            border: none;
            border-radius: 4px;
            background: var(--square-off);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .bit-btn.active { background: var(--square-on); }
        .decimal-val { font-size: 2rem; font-weight: 800; margin: 0.5rem 0; }

        .octet-controls { display: flex; gap: 8px; justify-content: center; }
        .util-btn {
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .util-btn:hover { border-color: var(--primary); color: var(--primary); }
        .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            border-top: 2px solid #f1f5f9;
            padding-top: 2rem;
        }

        .stat-card { background: #eff6ff; padding: 1.5rem; border-radius: 1rem; text-align: center; }
        .stat-card.purple { background: #f5f3ff; }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: #64748b; margin-bottom: 5px;}
        .value { font-size: 1.2rem; font-weight: 900; font-family: monospace; }
        .dot { font-size: 2.5rem; font-weight: 900; color: #cbd5e1; margin-top: -20px;}

        /* Calculator */
        .calculator {
            background: var(--calc-bg);
            padding: 1.5rem;
            border-radius: 1.5rem;
            color: white;
            height: fit-content;
            position: sticky;
            top: 1.5rem;
        }

        .calc-display {
            background: #0f172a;
            padding: 1rem;
            text-align: right;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            min-height: 60px;
        }

        #calc-history { font-size: 0.85rem; color: #94a3b8; min-height: 1.4rem; }
        #calc-main { font-size: 2rem; font-weight: bold; overflow-x: hidden; }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn {
            padding: 16px 5px;
            border-radius: 10px;
            border: none;
            background: #334155;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .calc-btn:hover { background: #475569; }
        .op-btn { background: #475569; color: #38bdf8; }
        .eq-btn { background: var(--primary); grid-column: span 2; }
        .clear-btn { background: var(--danger); }

        @media (max-width: 1100px) {
            .main-wrapper { grid-template-columns: 1fr; }
            .calculator { position: static; }
            .dot { display: none; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="app-container">
        <header><h1>Subnet Logic Trainer</h1></header>
        <div class="ipv4-display" id="subnet-root"></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="label">Subnet Mask</div><div id="mask-val" class="value">0.0.0.0</div></div>
            <div class="stat-card"><div class="label">CIDR Notation</div><div id="cidr-val" class="value">/0</div></div>
            <div class="stat-card purple"><div class="label">Total Networks</div><div id="nets-val" class="value">1</div></div>
            <div class="stat-card purple"><div class="label">Usable Hosts</div><div id="hosts-val" class="value">0</div></div>
        </div>
    </div>

    <div class="calculator">
        <div class="label" style="color: #94a3b8; margin-bottom: 10px;">Exponent Calculator</div>
        <div class="calc-display">
            <div id="calc-history"></div>
            <div id="calc-main">0</div>
        </div>
        <div class="calc-grid">
            <button class="calc-btn clear-btn" id="btn-c">C</button>
            <button class="calc-btn op-btn" data-val="**">xʸ</button>
            <button class="calc-btn op-btn" data-val="/">/</button>
            <button class="calc-btn op-btn" id="btn-del">⌫</button>
            <button class="calc-btn" data-val="7">7</button>
            <button class="calc-btn" data-val="8">8</button>
            <button class="calc-btn" data-val="9">9</button>
            <button class="calc-btn op-btn" data-val="*">×</button>
            <button class="calc-btn" data-val="4">4</button>
            <button class="calc-btn" data-val="5">5</button>
            <button class="calc-btn" data-val="6">6</button>
            <button class="calc-btn op-btn" data-val="-">-</button>
            <button class="calc-btn" data-val="1">1</button>
            <button class="calc-btn" data-val="2">2</button>
            <button class="calc-btn" data-val="3">3</button>
            <button class="calc-btn op-btn" data-val="+">+</button>
            <button class="calc-btn" data-val="0">0</button>
            <button class="calc-btn" data-val=".">.</button>
            <button class="calc-btn eq-btn" id="btn-eq">=</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- SUBNET ENGINE ---
        const weights = [128, 64, 32, 16, 8, 4, 2, 1];
        let maskLength = 0;

        function updateSubnet() {
            const root = document.getElementById('subnet-root');
            root.innerHTML = '';
            const octets = [0,0,0,0];

            for (let o = 0; o < 4; o++) {
                const group = document.createElement('div');
                group.className = 'octet-group';
                const row = document.createElement('div');
                row.className = 'bits-row';

                for (let b = 0; b < 8; b++) {
                    const idx = (o * 8) + b;
                    const active = idx < maskLength;
                    if (active) octets[o] += weights[b];

                    const col = document.createElement('div');
                    col.className = 'bit-col';
                    col.innerHTML = `<div class="bit-label">${weights[b]}</div>`;
                    const btn = document.createElement('button');
                    btn.className = `bit-btn ${active ? 'active' : ''}`;
                    btn.textContent = active ? '1' : '0';
                    btn.onclick = () => { maskLength = (maskLength === idx + 1) ? idx : idx + 1; updateSubnet(); };
                    col.appendChild(btn);
                    row.appendChild(col);
                }
                group.appendChild(row);
                const decDisplay = document.createElement('div');
                decDisplay.className = 'decimal-val';
                decDisplay.textContent = octets[o];
                group.appendChild(decDisplay);

                const ctrl = document.createElement('div');
                ctrl.className = 'octet-controls';
                const fBtn = document.createElement('button');
                fBtn.className = 'util-btn'; fBtn.textContent = 'SET 255';
                fBtn.onclick = () => { maskLength = (o + 1) * 8; updateSubnet(); };
                const cBtn = document.createElement('button');
                cBtn.className = 'util-btn btn-clear'; cBtn.textContent = 'CLEAR';
                cBtn.onclick = () => { maskLength = o * 8; updateSubnet(); };
                
                ctrl.append(fBtn, cBtn);
                group.appendChild(ctrl);
                root.appendChild(group);
                if (o < 3) { const d = document.createElement('div'); d.className = 'dot'; d.textContent = '.'; root.appendChild(d); }
            }

            const usable = maskLength >= 31 ? 0 : Math.pow(2, 32 - maskLength) - 2;
            document.getElementById('mask-val').textContent = octets.join('.');
            document.getElementById('cidr-val').textContent = `/${maskLength}`;
            document.getElementById('nets-val').textContent = Math.pow(2, maskLength).toLocaleString();
            document.getElementById('hosts-val').textContent = usable.toLocaleString();
        }

        // --- CALCULATOR ENGINE ---
        let expression = "";
        const main = document.getElementById('calc-main');
        const hist = document.getElementById('calc-history');

        document.querySelectorAll('.calc-btn[data-val]').forEach(b => {
            b.onclick = () => { expression += b.getAttribute('data-val'); main.textContent = expression.replace(/\*\*/g, '^'); };
        });

        document.getElementById('btn-c').onclick = () => { expression = ""; main.textContent = "0"; hist.textContent = ""; };
        document.getElementById('btn-del').onclick = () => { expression = expression.slice(0, -1); main.textContent = expression || "0"; };
        document.getElementById('btn-eq').onclick = () => {
            try {
                const res = eval(expression);
                hist.textContent = expression.replace(/\*\*/g, '^') + " =";
                main.textContent = res;
                expression = res.toString();
            } catch { main.textContent = "Error"; expression = ""; }
        };

        updateSubnet();
    })();
</script>
</body>
</html>
