<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnet Mask Logic Trainer</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --text: #0f172a;
            --square-on: #10b981;
            --square-off: #cbd5e1;
            --accent: #7c3aed;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        p { color: #64748b; font-size: 0.9rem; }

        .ipv4-display {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 2rem;
            align-items: center;
        }

        .octet-group {
            background: #f8fafc;
            padding: 1.2rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .bits-row { display: flex; gap: 4px; margin-bottom: 1rem; }

        .bit-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .bit-label { font-size: 0.65rem; font-weight: bold; color: #94a3b8; }

        .bit-btn {
            width: 32px;
            height: 40px;
            border: none;
            border-radius: 4px;
            background: var(--square-off);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .bit-btn.active { background: var(--square-on); }
        .bit-btn:hover { opacity: 0.8; }

        .decimal-val { font-size: 1.75rem; font-weight: 800; color: var(--text); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            border-top: 2px solid #f1f5f9;
            padding-top: 2rem;
        }

        .stat-card {
            background: #fdf2f8;
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #fce7f3;
        }

        .stat-card.blue { background: #eff6ff; border-color: #dbeafe; }
        .stat-card.purple { background: #f5f3ff; border-color: #ede9fe; }

        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: #64748b; margin-bottom: 0.5rem; }
        .value { font-size: 1.25rem; font-weight: 900; color: var(--text); font-family: monospace; }
        
        .dot { font-size: 2.5rem; font-weight: 900; color: #cbd5e1; height: 40px; line-height: 40px; }

        @media (max-width: 768px) {
            .dot { display: none; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Subnet Mask Logic Trainer</h1>
        <p>Click any bit to set the mask. The logic will auto-fill preceding bits to maintain a valid sequence.</p>
    </header>

    <div class="ipv4-display" id="root"></div>

    <div class="stats-grid">
        <div class="stat-card blue">
            <div class="label">Subnet Mask</div>
            <div id="mask-val" class="value">0.0.0.0</div>
        </div>
        <div class="stat-card">
            <div class="label">CIDR Prefix</div>
            <div id="cidr-val" class="value">/0</div>
        </div>
        <div class="stat-card purple">
            <div class="label">Total Networks</div>
            <div id="nets-val" class="value">1</div>
        </div>
        <div class="stat-card blue">
            <div class="label">Usable Hosts</div>
            <div id="hosts-val" class="value">0</div>
        </div>
    </div>
</div>

<script>
    const weights = [128, 64, 32, 16, 8, 4, 2, 1];
    let maskLength = 0; // Tracking total number of bits set to 1

    function handleBitClick(clickedIndex) {
        // Correcting the sequence logic:
        // If they click a bit that is currently 0, set mask length to that position.
        // If they click a bit that is already 1, they are likely trying to shorten the mask.
        const targetIndex = clickedIndex + 1;
        
        if (maskLength === targetIndex) {
            maskLength = clickedIndex; // Toggle off if clicking the last active bit
        } else {
            maskLength = targetIndex; // Set length to the clicked bit
        }
        
        render();
    }

    function calculate() {
        const octets = [0, 0, 0, 0];
        for (let i = 0; i < maskLength; i++) {
            const octetIdx = Math.floor(i / 8);
            const bitIdx = i % 8;
            octets[octetIdx] += weights[bitIdx];
        }

        const hostBits = 32 - maskLength;
        const totalAddresses = Math.pow(2, hostBits);
        const usableHosts = maskLength >= 31 ? 0 : totalAddresses - 2;
        const networks = Math.pow(2, maskLength);

        document.getElementById('mask-val').textContent = octets.join('.');
        document.getElementById('cidr-val').textContent = `/${maskLength}`;
        document.getElementById('hosts-val').textContent = usableHosts.toLocaleString();
        document.getElementById('nets-val').textContent = networks.toLocaleString();
    }

    function render() {
        const container = document.getElementById('root');
        container.innerHTML = '';

        for (let o = 0; o < 4; o++) {
            const group = document.createElement('div');
            group.className = 'octet-group';
            
            const row = document.createElement('div');
            row.className = 'bits-row';

            let octetSum = 0;
            for (let b = 0; b < 8; b++) {
                const globalIdx = (o * 8) + b;
                const isActive = globalIdx < maskLength;
                if (isActive) octetSum += weights[b];

                const col = document.createElement('div');
                col.className = 'bit-col';

                const label = document.createElement('div');
                label.className = 'bit-label';
                label.textContent = weights[b];

                const btn = document.createElement('button');
                btn.className = `bit-btn ${isActive ? 'active' : ''}`;
                btn.textContent = isActive ? '1' : '0';
                btn.onclick = () => handleBitClick(globalIdx);

                col.appendChild(label);
                col.appendChild(btn);
                row.appendChild(col);
            }

            const dec = document.createElement('div');
            dec.className = 'decimal-val';
            dec.textContent = octetSum;

            group.appendChild(row);
            group.appendChild(dec);
            container.appendChild(group);

            if (o < 3) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.textContent = '.';
                container.appendChild(dot);
            }
        }
        calculate();
    }

    render();
</script>

</body>
</html>
